<!DOCTYPE html>
<html>
<head>
    <title>AI Talent Agent</title>
</head>
<body>

<h1>AI Talent Scouting Agent</h1>

<textarea id="jd" placeholder="Paste Job Description here..." style="width:100%; height:100px;"></textarea>
<br><br>

<button onclick="analyze()">Analyze</button>

<h2>Results</h2>

<table border="1" id="resultsTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Match</th>
            <th>Interest</th>
            <th>Final</th>
            <th>Reason</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
async function analyze() {
    const jd = document.getElementById("jd").value;

    const response = await fetch("http://127.0.0.1:5000/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ jd: jd })
    });

    const data = await response.json();

    const table = document.querySelector("#resultsTable tbody");
    table.innerHTML = "";

    data.results.forEach(c => {
        const row = `
            <tr>
                <td>${c.name}</td>
                <td>${c.match_score}%</td>
                <td>${c.interest_score}% (${c.interest_label})</td>
                <td>${c.final_score}</td>
                <td>${c.explanation}</td>
            </tr>
        `;
        table.innerHTML += row;
    });
}
</script>

</body>
</html>
